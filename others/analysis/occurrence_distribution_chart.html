<!doctype html>
<html>
  <head>
    <title>Match-up Occurrence Distribution</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <canvas id="myChart"></canvas>
    <script>
      const ctx = document.getElementById("myChart").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["1", "2", "3", "4", "5"],
          datasets: [
            {
              label: "Match-up Occurrence Distribution",
              data: [61, 32, 14, 17, 14],
              fill: false,
              borderColor: "rgb(75, 192, 192)",
              backgroundColor: "rgba(75, 192, 192, 0.5)",
              tension: 0.1,
            },
          ],
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Number of Match-ups",
              },
            },
            x: {
              title: {
                display: true,
                text: "Bet Number (Sorted)",
              },
            },
          },
        },
      });
    </script>
  </body>
</html>
